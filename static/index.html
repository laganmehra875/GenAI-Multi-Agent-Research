<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Multi-Agent Research Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="stars"></div>
    <div class="twinkling"></div>
    
    <header class="glass-panel">
        <div class="brand">
            <h1>GenAI Research</h1>
        </div>
        <div id="weather-widget" class="weather-glass">
            <span class="location">Uttarakhand</span>
            <span class="temp" id="w-temp">--°C</span>
            <span class="desc" id="w-desc">Loading...</span>
        </div>
    </header>

    <main class="container">
        <section class="search-section glass-panel">
            <h2>What would you like to research?</h2>
            <div class="input-group">
                <input type="text" id="topic-input" placeholder="e.g. Latest tech news in California..." autocomplete="off">
                <button id="search-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <span>Search</span>
                </button>
            </div>
        </section>

        <section id="results-section" class="results-container hidden">
            <div class="loading-screen hidden" id="loading-screen">
                <div class="orb"></div>
                <p>Multi-Agent Systems are initializing...</p>
                <div class="status-steps">
                    <span class="active">Search Agent Scanning Web...</span>
                    <span>Reader Agent Scraping Context...</span>
                    <span>Writer Drafting Report...</span>
                    <span>Critic Reviewing...</span>
                </div>
            </div>
            
            <div class="report-content glass-panel hidden" id="report-content">
                <div class="badge">Final Research Report</div>
                <div id="report-body" class="markdown-body"></div>
                <hr>
                <div class="badge critic">Critic Feedback</div>
                <div id="feedback-body" class="markdown-body"></div>
            </div>
        </section>
    </main>
    <script src="/static/script.js"></script>
</body>
</html>
